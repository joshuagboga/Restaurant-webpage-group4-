<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restuarant</title>
<link rel="stylesheet" href="/src/output.css">
    <script src="https://kit.fontawesome.com/fbf4810423.js" crossorigin="anonymous"></script>
</head>


<body>
      <!-- =============== section3================= -->

<section class="bg-[#2D5A43] min-h-screen flex flex-col items-center justify-center text-amber-50 font-sans">
  <!-- =======================================title===================================== -->

  <div class="text-center mb-12 max-w-2xl">
    <h2 class="text-4xl pt-5 md:text-5xl font-black mb-4 tracking-tight">
      The Numbers That <br> Define Us
    </h2>
    <p class="text-xs md:text-sm opacity-80 leading-relaxed px-4">
      Thousands of guests trust our quality, flavor, and service and the numbers below show exactly why we're one of the most loved restaurants in town.
    </p>
  </div>
<!-- =============================================food image====================== -->

  <div class="relative w-full max-w-4xl aspect-video flex items-center justify-center">
    
    <div class="z-10 w-48 h-64 md:w-64 md:h-80 overflow-hidden border-4 border-[#2D5A43] shadow-2xl">
       <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&q=80&w=600" 
            alt="Food/Person" 
            class="w-full h-full object-cover">
    </div>
    <!-- ============================================square image-============================= -->

    <div class="absolute top-0 left-[10%] md:left-[20%] group">
      <div class="w-28 h-28 md:w-36 md:h-36 bg-[#E1FF80] rotate-[15deg] flex items-center justify-center text-black shadow-lg transition-transform hover:scale-110">
        <div class="-rotate-[15deg] text-center">
          <p class="text-2xl md:text-3xl font-black">98%</p>
          <p class="text-[10px] md:text-xs font-bold leading-tight">Customer<br>Satisfaction</p>
        </div>
      </div>
    </div>
     <!-- =======================================polygon image==================================== -->

    <div class="absolute top-[20%] right-[10%] md:right-[19%]">
      <div class="w-28 h-28 md:w-36 md:h-36 bg-[#A5C9FF] flex items-center justify-center text-black shadow-lg transition-transform hover:scale-110"
           style="clip-path: polygon(100% 50%, 98% 57%, 94% 65%, 89% 72%, 82% 78%, 75% 84%, 67% 88%, 59% 91%, 50% 92%, 41% 91%, 33% 88%, 25% 84%, 18% 78%, 11% 72%, 6% 65%, 2% 57%, 0% 50%, 2% 43%, 6% 35%, 11% 28%, 18% 22%, 25% 16%, 33% 12%, 41% 9%, 50% 8%, 59% 9%, 67% 12%, 75% 16%, 82% 22%, 89% 28%, 94% 35%, 98% 43%);">
        <div class="text-center p-2">
          <p class="text-2xl md:text-3xl font-black">92%</p>
          <p class="text-[10px] md:text-xs font-bold leading-tight">Repeat<br>Visitors</p>
        </div>
      </div>
    </div>
    <!-- ===========================================circle image==================================== -->
    <div class="absolute bottom-[-1%] left-[25%] md:left-[35%] z-20">
      <div class="w-28 h-28 md:w-36 md:h-36 bg-[#F9E44C] rounded-full flex items-center justify-center text-black shadow-xl transition-transform hover:scale-110 border-4 border-[#2D5A43]">
        <div class="text-center">
          <p class="text-2xl md:text-3xl font-black">95%</p>
          <p class="text-[10px] md:text-xs font-bold leading-tight">On-Time<br>Service</p>
        </div>
      </div>
    </div>

  </div>
</section>
</body>
</html>
