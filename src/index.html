<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restuarant</title>
<link rel="stylesheet" href="/src/output.css">
    <script src="https://kit.fontawesome.com/fbf4810423.js" crossorigin="anonymous"></script>
</head>


<body>
     <!-- section4/5 -->

  <section class=" py-16 bg-[#E6DECC]">

    <!-- Heading -->
    <div class="text-center mb-12 ">
      <h2 class="text-5xl font-extrabold text-green-900">
        Taste Approved by <br> Thousands
      </h2>
    </div>

    <!-- Grid -->
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6 px-6">

      <!-- Image 1 -->
      <div class="rounded-xl overflow-hidden">
        <img src="public/food.jpeg" class="w-full h-full object-cover" alt="">
      </div>

      <!-- Testimonial Card -->
      <div class="bg-green-800 text-white p-8 rounded-xl flex flex-col justify-center text-center">
        <p class="text-sm leading-relaxed mb-6">
          "Absolutely amazing experience! The flavors were spot on and the service felt so personal.
          This is easily my favorite dining spot in town!"
        </p>

        <div class="text-yellow-400 text-lg mb-2">
          ★★★★★
        </div>

        <p class="text-sm font-semibold">
          Numa Fatahi, Actor
        </p>
      </div>

      <!-- Image 2 -->
      <div class="rounded-xl overflow-hidden">
        <img src="public/Unconfirmed 315374.jpeg" class="w-full h-full object-cover" alt="">
      </div>

      <!-- Image 3 -->
      <div class="rounded-xl overflow-hidden">
        <img src="public/somebody.jpeg" class="w-full h-full object-cover" alt="">
      </div>

    </div>

  </section>


  <section class="mb-0">

    <div class="w-full grid grid-cols-1 -mb-5 md:grid-cols-2 items-center overflow-hidden">

      <!-- Food Image -->
      <div>
        <img src="public/plenty.jpeg" class="relative  w-full h-[380px] object-cover" alt="restaurant dining">

      </div>


      <!-- Card -->
      <div class="bg-green-900 text-white  p-14 min-h-[380px] flex flex-col justify-center text-center">

        <h3 class="text-4xl font-bold mb-4">
          Reserve Your Table
        </h3>

        <p class="text-sm opacity-90 mb-8 max-w-sm mx-auto">
          Plan your perfect meal with us simple, quick, and guaranteed to delight.
        </p>

        <button
          class="bg-lime-300 text-green-900 px-7 py-3 rounded-lg font-semibold hover:bg-lime-400 transition mx-auto">
          Book a table
        </button>

      </div>

    </div>

  </section>
</body>
</html>
